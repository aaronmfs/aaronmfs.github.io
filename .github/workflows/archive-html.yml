name: Archive HTML/CSS/JS Build

on:
  workflow_dispatch:

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx vite build --base=./
      - name: Package archive
        run: |
          cp serve.sh serve.bat dist/
          chmod +x dist/serve.sh
          cd dist
          zip -r ../portfolio-html.zip .
      - uses: actions/upload-artifact@v4
        with:
          name: portfolio-html-css-js
          path: portfolio-html.zip
